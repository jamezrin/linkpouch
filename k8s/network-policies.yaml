---
# Default deny-all ingress + egress for all pods in the namespace.
# Explicit allow rules below override this for each service.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: linkpouch-dev
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Frontend: accepts ingress from the ingress controller only,
# and can reach the api-gateway.
# Note: Traefik runs in the 'traefik' namespace (not kube-system) on this cluster,
# so both namespaces must be allowed here.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend
  namespace: linkpouch-dev
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 8080
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# API Gateway: accepts ingress from the frontend (and ingress controller),
# can reach only the stash-service.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway
  namespace: linkpouch-dev
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: stash-service
      ports:
        - port: 8080
    # Wayback Machine CDX proxy requires external HTTPS egress
    - ports:
        - port: 443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# Stash Service: accepts ingress from api-gateway and indexer-service,
# can reach PostgreSQL, Redis, and SeaweedFS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: stash-service
  namespace: linkpouch-dev
spec:
  podSelector:
    matchLabels:
      app: stash-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
        - podSelector:
            matchLabels:
              app: indexer-service
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: seaweedfs
      ports:
        - port: 8333
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# Indexer Service: reads from Redis and SeaweedFS, calls back to stash-service,
# and fetches external URLs for scraping. No ingress allowed.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: indexer-service
  namespace: linkpouch-dev
spec:
  podSelector:
    matchLabels:
      app: indexer-service
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: seaweedfs
      ports:
        - port: 8333
    - to:
        - podSelector:
            matchLabels:
              app: stash-service
      ports:
        - port: 8080
    # Allow scraping external URLs (HTTP/HTTPS)
    - ports:
        - port: 80
        - port: 443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# PostgreSQL: only accepts connections from stash-service.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres
  namespace: linkpouch-dev
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: stash-service
      ports:
        - port: 5432
  egress: []

---
# Redis: accepts connections from stash-service, indexer-service, and the
# KEDA operator (which queries stream lag to drive autoscaling).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis
  namespace: linkpouch-dev
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: stash-service
        - podSelector:
            matchLabels:
              app: indexer-service
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keda
      ports:
        - port: 6379
  egress: []

---
# SeaweedFS: only accepts connections from stash-service and indexer-service.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: seaweedfs
  namespace: linkpouch-dev
spec:
  podSelector:
    matchLabels:
      app: seaweedfs
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: stash-service
        - podSelector:
            matchLabels:
              app: indexer-service
      ports:
        - port: 8333
  egress: []
