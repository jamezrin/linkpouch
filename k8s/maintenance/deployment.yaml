apiVersion: v1
kind: ConfigMap
metadata:
  name: maintenance-page
  namespace: linkpouch-dev
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>linkpou.ch — maintenance</title>
      <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
          background: #0f0f0f;
          color: #e5e5e5;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .container {
          text-align: center;
          padding: 2rem;
          max-width: 480px;
        }
        .brand-name {
          font-size: 0.875rem;
          font-weight: 600;
          letter-spacing: -0.01em;
          color: #fff;
          opacity: 0.35;
          margin-bottom: 2.5rem;
        }
        .icon {
          margin-bottom: 1.75rem;
          animation: float 3s ease-in-out infinite;
        }
        h1 {
          font-size: 1.125rem;
          font-weight: 600;
          color: #fff;
          margin-bottom: 0.75rem;
        }
        p {
          font-size: 0.9375rem;
          color: #888;
          line-height: 1.6;
        }
        @keyframes float {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-6px); }
        }
      </style>
    </head>
    <body>
      <div class="container">
        <div class="brand-name">linkpou.ch</div>
        <div class="icon">
          <svg width="52" height="52" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#6366f1"/>
                <stop offset="100%" stop-color="#4338ca"/>
              </linearGradient>
            </defs>
            <rect width="32" height="32" rx="7" fill="url(#bg)"/>
            <rect x="7" y="15" width="18" height="12" rx="3.5" fill="white"/>
            <rect x="11" y="12" width="10" height="5" rx="1.5" fill="white"/>
            <circle cx="16" cy="10" r="2.5" fill="white"/>
            <line x1="14.2" y1="8.8" x2="11.5" y2="6.5" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
            <line x1="17.8" y1="8.8" x2="20.5" y2="6.5" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </div>
        <h1>Back shortly</h1>
        <p>We're performing scheduled maintenance.<br/>Your stashes are safe — we'll be back soon.</p>
      </div>
    </body>
    </html>
---
apiVersion: v1
kind: Service
metadata:
  name: maintenance
  namespace: linkpouch-dev
spec:
  selector:
    app: maintenance
  ports:
  - port: 80
    targetPort: 80
    name: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maintenance
  namespace: linkpouch-dev
  labels:
    app: maintenance
spec:
  replicas: 0
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: maintenance
  template:
    metadata:
      labels:
        app: maintenance
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
      volumes:
      - name: html
        configMap:
          name: maintenance-page
