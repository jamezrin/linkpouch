apiVersion: v1
kind: ConfigMap
metadata:
  name: maintenance-page
  namespace: linkpouch-dev
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>linkpou.ch — maintenance</title>
      <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
          background: #0f0f0f;
          color: #e5e5e5;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .container {
          text-align: center;
          padding: 2rem;
          max-width: 480px;
        }
        .logo {
          font-size: 1.5rem;
          font-weight: 700;
          letter-spacing: -0.02em;
          color: #fff;
          margin-bottom: 2.5rem;
          opacity: 0.9;
        }
        h1 {
          font-size: 1.125rem;
          font-weight: 600;
          color: #fff;
          margin-bottom: 0.75rem;
        }
        p {
          font-size: 0.9375rem;
          color: #888;
          line-height: 1.6;
        }
        .dot {
          display: inline-block;
          width: 6px;
          height: 6px;
          border-radius: 50%;
          background: #f97316;
          margin-bottom: 2rem;
          animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.4; transform: scale(0.8); }
        }
      </style>
    </head>
    <body>
      <div class="container">
        <div class="logo">linkpou.ch</div>
        <div class="dot"></div>
        <h1>Back shortly</h1>
        <p>We're performing scheduled maintenance.<br/>Your stashes are safe — we'll be back soon.</p>
      </div>
    </body>
    </html>
---
apiVersion: v1
kind: Service
metadata:
  name: maintenance
  namespace: linkpouch-dev
spec:
  selector:
    app: maintenance
  ports:
  - port: 80
    targetPort: 80
    name: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maintenance
  namespace: linkpouch-dev
  labels:
    app: maintenance
spec:
  replicas: 0
  selector:
    matchLabels:
      app: maintenance
  template:
    metadata:
      labels:
        app: maintenance
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
      volumes:
      - name: html
        configMap:
          name: maintenance-page
