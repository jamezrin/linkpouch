apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: linkpouch-ingress
  namespace: linkpouch-dev
  annotations:
    # Traefik Ingress Controller
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # Middlewares (comma-separated)
    traefik.ingress.kubernetes.io/router.middlewares: linkpouch-dev-redirect-https@kubernetescrd,linkpouch-dev-rate-limit@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: linkpou.ch
      http:
        paths:
          # Maintenance mode — all traffic routed to maintenance page
          - path: /
            pathType: Prefix
            backend:
              service:
                name: maintenance
                port:
                  number: 80
  tls:
    - hosts:
        - linkpou.ch
      secretName: linkpouch-tls
