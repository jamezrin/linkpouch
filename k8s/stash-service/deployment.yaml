apiVersion: apps/v1
kind: Deployment
metadata:
  name: stash-service
  namespace: linkpouch-dev
  labels:
    app: stash-service
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: stash-service
  template:
    metadata:
      labels:
        app: stash-service
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      initContainers:
      - name: atlas-migrate
        image: ghcr.io/jamezrin/linkpouch/stash-service:latest
        imagePullPolicy: Always
        command:
          - atlas
          - migrate
          - apply
          - --dir
          - file:///migrations
          - --url
          - "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)?search_path=public&sslmode=disable"
        env:
        - name: POSTGRES_HOST
          value: postgres-rw.postgres
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: linkpouch
        - name: POSTGRES_USER
          value: linkpouch
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
      containers:
      - name: stash-service
        image: ghcr.io/jamezrin/linkpouch/stash-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: POSTGRES_HOST
          value: postgres-rw.postgres
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_DB
          value: linkpouch
        - name: POSTGRES_USER
          value: linkpouch
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        - name: REDIS_HOST
          value: redis
        - name: REDIS_PORT
          value: "6379"
        - name: SIGNATURE_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: stash-service-secret
              key: SIGNATURE_MASTER_KEY
        - name: INDEXER_CALLBACK_SECRET
          valueFrom:
            secretKeyRef:
              name: stash-service-secret
              key: INDEXER_CALLBACK_SECRET
        - name: S3_ENDPOINT
          value: http://seaweedfs:8333
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: seaweedfs-secret
              key: stash-access-key
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: seaweedfs-secret
              key: stash-secret-key
        - name: S3_BUCKET
          value: linkpouch-screenshots
        - name: BASE_URL
          value: https://linkpou.ch
        - name: FRONTEND_URL
          value: https://linkpou.ch
        - name: GITHUB_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: stash-service-secret
              key: GITHUB_CLIENT_ID
        - name: GITHUB_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: stash-service-secret
              key: GITHUB_CLIENT_SECRET
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: stash-service-secret
              key: GOOGLE_CLIENT_ID
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: stash-service-secret
              key: GOOGLE_CLIENT_SECRET
        - name: DISCORD_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: stash-service-secret
              key: DISCORD_CLIENT_ID
        - name: DISCORD_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: stash-service-secret
              key: DISCORD_CLIENT_SECRET
        - name: TWITTER_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: stash-service-secret
              key: TWITTER_CLIENT_ID
        - name: TWITTER_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: stash-service-secret
              key: TWITTER_CLIENT_SECRET
        - name: AI_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: stash-service-secret
              key: AI_ENCRYPTION_KEY
        - name: AI_INCLUDED_API_KEY
          valueFrom:
            secretKeyRef:
              name: stash-service-secret
              key: AI_INCLUDED_API_KEY
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
