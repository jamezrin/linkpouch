apiVersion: apps/v1
kind: Deployment
metadata:
  name: indexer-service
  namespace: linkpouch-dev
  labels:
    app: indexer-service
spec:
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: indexer-service
  template:
    metadata:
      labels:
        app: indexer-service
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: indexer-service
        image: ghcr.io/jamezrin/linkpouch/indexer-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
          name: http
        env:
        - name: CONSUMER_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: ENVIRONMENT
          value: production
        - name: REDIS_HOST
          value: redis
        - name: REDIS_PORT
          value: "6379"
        - name: PLAYWRIGHT_HEADLESS
          value: "true"
        - name: PLAYWRIGHT_TIMEOUT
          value: "30000"
        - name: S3_ENDPOINT
          value: http://seaweedfs:8333
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: seaweedfs-secret
              key: indexer-access-key
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: seaweedfs-secret
              key: indexer-secret-key
        - name: S3_BUCKET
          value: linkpouch-screenshots
        - name: STASH_SERVICE_URL
          value: http://stash-service:8080
        - name: INDEXER_CALLBACK_SECRET
          valueFrom:
            secretKeyRef:
              name: stash-service-secret
              key: INDEXER_CALLBACK_SECRET
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
