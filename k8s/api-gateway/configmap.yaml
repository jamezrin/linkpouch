apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: linkpouch-dev
data:
  application.yml: |
    spring:
      application:
        name: api-gateway
      cloud:
        gateway:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                  - PATCH
                allowedHeaders:
                  - "*"
                allowCredentials: false
          routes:
            # Stash Service - stash routes
            - id: stash-service-stashes
              uri: http://stash-service:8080
              predicates:
                - Path=/api/stashes/**
              filters:
                - StripPrefix=1

            # Stash Service - link routes (including screenshot proxy)
            - id: stash-service-links
              uri: http://stash-service:8080
              predicates:
                - Path=/api/links/**
              filters:
                - StripPrefix=1

            # Wayback Machine CDX API proxy (avoids CORS restrictions)
            - id: wayback-cdx-proxy
              uri: https://web.archive.org
              predicates:
                - Path=/api/wayback/cdx
              filters:
                - StripPrefix=2
                - SetRequestHeader=Host, web.archive.org

            # Health check route
            - id: health
              uri: http://stash-service:8080
              predicates:
                - Path=/health
              filters:
                - StripPrefix=0

    server:
      port: 8080

    management:
      endpoints:
        web:
          exposure:
            include: health,info,gateway
          base-path: /actuator
      endpoint:
        health:
          show-details: always
      health:
        defaults:
          enabled: true

    logging:
      level:
        org.springframework.cloud.gateway: INFO
        reactor.netty: INFO
