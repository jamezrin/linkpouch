apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: linkpouch-dev
type: Opaque
# IMPORTANT: Do not store actual credentials here.
# Populate REDIS_PASSWORD via an external secrets manager
# (e.g. Sealed Secrets, SOPS, or External Secrets Operator).
# The placeholder below must be replaced before deployment.
stringData:
  REDIS_PASSWORD: "CHANGE_ME_USE_EXTERNAL_SECRETS"
