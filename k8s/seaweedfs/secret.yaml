apiVersion: v1
kind: Secret
metadata:
  name: seaweedfs-secret
  namespace: linkpouch-dev
type: Opaque
# IMPORTANT: Do not store actual credentials here.
# Populate all keys via an external secrets manager
# (e.g. Sealed Secrets, SOPS, or External Secrets Operator).
# The placeholders below must be replaced before deployment.
# Also consider creating separate credentials per service (indexer: Write only,
# stash-service: Read+Delete only) instead of a single Admin credential.
stringData:
  access-key: "CHANGE_ME_USE_EXTERNAL_SECRETS"
  secret-key: "CHANGE_ME_USE_EXTERNAL_SECRETS"
  s3-config.json: |
    {
      "identities": [
        {
          "name": "indexer",
          "credentials": [
            {
              "accessKey": "CHANGE_ME_INDEXER_ACCESS_KEY",
              "secretKey": "CHANGE_ME_INDEXER_SECRET_KEY"
            }
          ],
          "actions": ["Write", "Tagging"]
        },
        {
          "name": "stash-service",
          "credentials": [
            {
              "accessKey": "CHANGE_ME_STASH_ACCESS_KEY",
              "secretKey": "CHANGE_ME_STASH_SECRET_KEY"
            }
          ],
          "actions": ["Read", "List", "Delete"]
        }
      ]
    }
