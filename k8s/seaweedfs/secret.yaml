apiVersion: v1
kind: Secret
metadata:
  name: seaweedfs-secret
  namespace: linkpouch-dev
type: Opaque
stringData:
  access-key: "linkpouch-access-key"
  secret-key: "linkpouch-secret-key-change-in-production"
  s3-config.json: |
    {
      "identities": [
        {
          "name": "linkpouch",
          "credentials": [
            {
              "accessKey": "linkpouch-access-key",
              "secretKey": "linkpouch-secret-key-change-in-production"
            }
          ],
          "actions": ["Admin", "Read", "Write", "Tagging", "List"]
        }
      ]
    }
