[tools]
# Java
java = "temurin-21.0.10+7.0.LTS"
maven = "3.9"

# Node.js
node = "22"
npm = "10"

# Python (for indexer service)
python = "3.13"

# Infrastructure tools
kubectl = "latest"
atlas = "latest"

[tasks.build]
description = "Build all services"
run = "cd services/stash-service && mvn clean package -DskipTests"

[tasks.test]
description = "Run all tests"
run = "cd services/stash-service && mvn test"

[tasks.dev]
description = "Start local development environment"
run = "docker-compose up -d postgres redis seaweedfs"

[tasks.dev-down]
description = "Stop local development environment"
run = "docker-compose down"

[tasks.migrate]
description = "Apply pending Atlas migrations to the local database"
run = "atlas migrate apply --env local"

[tasks.migrate-new]
description = "Create a new blank Atlas migration file (usage: mise run migrate-new -- <name>)"
run = "atlas migrate new --env local $@"

[tasks.migrate-hash]
description = "Recalculate atlas.sum after manually editing migration files"
run = "atlas migrate hash --env local"

[tasks.migrate-status]
description = "Show migration status for the local database"
run = "atlas migrate status --env local"

[tasks.k8s-deploy]
description = "Deploy to Kubernetes dev namespace"
run = "kubectl apply -f k8s/ -n linkpouch-dev"
