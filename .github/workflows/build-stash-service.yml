name: Build Stash Service

on:
  push:
    branches: [main, master]
    paths:
      - 'services/stash-service/**'
      - '.github/workflows/build-container.yml'
      - '.github/workflows/build-stash-service.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'services/stash-service/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-stash-service:
    uses: ./.github/workflows/build-container.yml
    with:
      service-name: stash-service
      dockerfile-path: ./services/stash-service/Dockerfile
      context-path: ./services/stash-service
    secrets: inherit
