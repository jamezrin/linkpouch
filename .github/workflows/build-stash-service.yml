name: Build Stash Service

on:
  push:
    branches: [main, master]
    paths:
      - 'services/stash-service/**'
      - 'atlas.hcl'
      - '.github/workflows/build-stash-service.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'services/stash-service/**'
      - 'atlas.hcl'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/stash-service

jobs:
  # ── Step 1: Build the JAR (once, platform-independent) ──────────────────────
  build-jar:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: linkpouch
          POSTGRES_USER: linkpouch
          POSTGRES_PASSWORD: linkpouch_secret
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Atlas
        uses: ariga/setup-atlas@v0

      - name: Apply database migrations
        run: |
          atlas migrate apply --env ci \
            --var db_url="postgres://linkpouch:linkpouch_secret@localhost:5432/linkpouch?search_path=public&sslmode=disable"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        working-directory: services/stash-service
        run: |
          mvn clean verify -B

      - name: Upload boot JAR
        uses: actions/upload-artifact@v4
        with:
          name: stash-service-jar
          path: services/stash-service/boot/target/*.jar
          retention-days: 1
          if-no-files-found: error

  # ── Step 2: Build multi-arch container images ───────────────────────────────
  build-amd64:
    runs-on: ubuntu-24.04
    needs: build-jar
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download boot JAR
        uses: actions/download-artifact@v4
        with:
          name: stash-service-jar
          path: services/stash-service/boot/target

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,suffix=-amd64,format=short

      - name: Build and push AMD64 image
        uses: docker/build-push-action@v5
        with:
          context: services/stash-service
          file: services/stash-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=stash-service-amd64
          cache-to: type=gha,mode=min,scope=stash-service-amd64

  build-arm64:
    runs-on: ubuntu-24.04-arm
    needs: build-jar
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download boot JAR
        uses: actions/download-artifact@v4
        with:
          name: stash-service-jar
          path: services/stash-service/boot/target

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,suffix=-arm64,format=short

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v5
        with:
          context: services/stash-service
          file: services/stash-service/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=stash-service-arm64
          cache-to: type=gha,mode=min,scope=stash-service-arm64

  # ── Step 3: Merge into a multi-arch manifest ────────────────────────────────
  merge-manifests:
    runs-on: ubuntu-24.04
    needs: [build-amd64, build-arm64]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create and push multi-arch manifest
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${SHORT_SHA} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}-amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}-arm64

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
