name: Build All Services

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # Note: stash-service has its own specialized workflow with PostgreSQL
  # See: build-stash-service.yml

  build-indexer-service:
    uses: ./.github/workflows/build-container.yml
    with:
      service-name: indexer-service
      dockerfile-path: ./services/indexer-service/Dockerfile
      context-path: ./services/indexer-service
    secrets: inherit

  build-api-gateway:
    uses: ./.github/workflows/build-container.yml
    with:
      service-name: api-gateway
      dockerfile-path: ./services/api-gateway/Dockerfile
      context-path: ./services/api-gateway
    secrets: inherit
