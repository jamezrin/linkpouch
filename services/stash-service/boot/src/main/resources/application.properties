spring.application.name=stash-service
server.port=8080
server.forward-headers-strategy=framework

# Database Configuration
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:linkpouch}
spring.datasource.username=${POSTGRES_USER:linkpouch}
spring.datasource.password=${POSTGRES_PASSWORD:linkpouch_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
# Schema is managed exclusively by Atlas — Hibernate must not modify it
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
management.metrics.export.prometheus.enabled=true

# Logging
logging.level.com.linkpouch=INFO
logging.level.org.springframework.web=INFO

# Signature Configuration — SIGNATURE_MASTER_KEY env var is required; no default allowed
linkpouch.signature.master-key=${SIGNATURE_MASTER_KEY}

# Indexer callback secret — INDEXER_CALLBACK_SECRET env var is required; no default allowed
linkpouch.indexer.callback-secret=${INDEXER_CALLBACK_SECRET}

# S3/SeaweedFS Configuration
linkpouch.s3.endpoint=${S3_ENDPOINT:http://localhost:9000}
linkpouch.s3.access-key=${S3_ACCESS_KEY:minioadmin}
linkpouch.s3.secret-key=${S3_SECRET_KEY:minioadmin}
linkpouch.s3.bucket=${S3_BUCKET:linkpouch-screenshots}

# Base URL for screenshot links
linkpouch.base-url=${BASE_URL:http://localhost:8080}

# Cache
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# OAuth2 Providers
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

spring.security.oauth2.client.registration.twitter.client-id=${TWITTER_CLIENT_ID:}
spring.security.oauth2.client.registration.twitter.client-secret=${TWITTER_CLIENT_SECRET:}
spring.security.oauth2.client.registration.twitter.client-authentication-method=client_secret_basic
spring.security.oauth2.client.registration.twitter.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.twitter.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.twitter.scope=tweet.read,users.read
spring.security.oauth2.client.provider.twitter.authorization-uri=https://twitter.com/i/oauth2/authorize
spring.security.oauth2.client.provider.twitter.token-uri=https://api.twitter.com/2/oauth2/token
spring.security.oauth2.client.provider.twitter.user-info-uri=https://api.twitter.com/2/users/me?user.fields=profile_image_url
spring.security.oauth2.client.provider.twitter.user-name-attribute=data

spring.security.oauth2.client.registration.discord.client-id=${DISCORD_CLIENT_ID:}
spring.security.oauth2.client.registration.discord.client-secret=${DISCORD_CLIENT_SECRET:}
spring.security.oauth2.client.registration.discord.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.discord.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.discord.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.discord.scope=identify,email
spring.security.oauth2.client.provider.discord.authorization-uri=https://discord.com/oauth2/authorize
spring.security.oauth2.client.provider.discord.token-uri=https://discord.com/api/oauth2/token
spring.security.oauth2.client.provider.discord.user-info-uri=https://discord.com/api/users/@me
spring.security.oauth2.client.provider.discord.user-name-attribute=id

# Account JWT
linkpouch.account.jwt.expiry-days=${LINKPOUCH_ACCOUNT_JWT_EXPIRY_DAYS:30}

# Frontend redirect target after OAuth
linkpouch.frontend-url=${FRONTEND_URL:http://localhost:3000}

# AI Settings
linkpouch.ai.encryption-key=${AI_ENCRYPTION_KEY:}
linkpouch.ai.included-api-key=${AI_INCLUDED_API_KEY:}
linkpouch.ai.included-model=${AI_INCLUDED_MODEL:google/gemini-flash-1.5}
linkpouch.ai.system-prompt=${AI_SYSTEM_PROMPT:}
