spring.application.name=stash-service
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:linkpouch}
spring.datasource.username=${POSTGRES_USER:linkpouch}
spring.datasource.password=${POSTGRES_PASSWORD:linkpouch_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# Logging
logging.level.com.linkpouch=INFO
logging.level.org.springframework.web=INFO

# Signature Configuration
linkpouch.signature.master-key=${SIGNATURE_MASTER_KEY:default-master-key-change-in-production}
