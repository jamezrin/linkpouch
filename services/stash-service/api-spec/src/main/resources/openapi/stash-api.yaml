  /account/me:
    get:
      summary: Get authenticated account profile
      operationId: getAccount
      tags:
        - Account
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
