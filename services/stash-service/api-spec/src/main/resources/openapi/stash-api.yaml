openapi: 3.0.3
info:
  title: Linkpouch Stash Service API
  description: API for managing stashes and links in Linkpouch
  version: 1.0.0
  contact:
    name: Linkpouch Team

servers:
  - url: /api
    description: Local development

security: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Short-lived JWT issued by POST /stashes/{stashId}/access-token

  schemas:
    CreateStashRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Name of the stash
        password:
          type: string
          minLength: 1
          maxLength: 255
          description: Optional passphrase to protect the stash

    AcquireAccessRequest:
      type: object
      properties:
        password:
          type: string
          minLength: 1
          maxLength: 255
          description: Required when the stash is password-protected

    AccessTokenResponse:
      type: object
      required:
        - accessToken
        - expiresIn
        - isClaimer
      properties:
        accessToken:
          type: string
          description: Short-lived JWT to use as Bearer token on all stash/link endpoints
        expiresIn:
          type: integer
          description: Token lifetime in seconds
        isClaimer:
          type: boolean
          description: True if the token was issued to the account that claimed this stash

    SetPasswordRequest:
      type: object
      required:
        - password
      properties:
        password:
          type: string
          minLength: 1
          maxLength: 255
          description: New passphrase to protect the stash

    StashResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        passwordProtected:
          type: boolean
          description: Whether this stash requires a password to access
        visibility:
          type: string
          enum:
            - SHARED
            - PRIVATE
          description: Who can access this stash (SHARED = anyone with URL, PRIVATE = claimer only)
        linkPermissions:
          type: string
          enum:
            - FULL
            - READ_ONLY
          description: Write access for non-owner visitors (FULL = anyone can edit, READ_ONLY = owner only)
        linkCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        signedUrl:
          type: string
          description: Signed URL for accessing this stash (only returned on creation)

    AddLinkRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          description: URL to add
        title:
          type: string
          description: Optional title override
        description:
          type: string
          description: Optional description override

    AddLinksBatchRequest:
      type: object
      required: [urls]
      properties:
        urls:
          type: array
          items: { type: string }
          minItems: 1
          maxItems: 100

    BatchImportError:
      type: object
      properties:
        url: { type: string }
        reason: { type: string }

    AddLinksBatchResponse:
      type: object
      properties:
        imported: { type: integer }
        skipped: { type: integer }
        errors:
          type: array
          items: { $ref: '#/components/schemas/BatchImportError' }
        links:
          type: array
          items: { $ref: '#/components/schemas/LinkResponse' }

    LinkResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        stashId:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        title:
          type: string
        description:
          type: string
        faviconUrl:
          type: string
          format: uri
        screenshotUrl:
          type: string
          format: uri
        screenshotGeneratedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        position:
          type: integer
        status:
          type: string
          enum:
            - PENDING
            - INDEXED
            - FAILED
          description: Indexing lifecycle status of the link

    PagedLinkResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/LinkResponse'
        totalElements:
          type: integer
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    UpdateLinkMetadataRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        faviconUrl:
          type: string
        pageContent:
          type: string
        finalUrl:
          type: string

    UpdateLinkStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - PENDING
            - INDEXED
            - FAILED
          description: New indexing status for the link

    UpdateLinkScreenshotRequest:
      type: object
      required:
        - screenshotKey
      properties:
        screenshotKey:
          type: string

    ReorderLinksRequest:
      type: object
      required:
        - linkIds
      properties:
        linkIds:
          type: array
          items:
            type: string
            format: uuid
        insertAfterId:
          type: string
          format: uuid
          nullable: true
          description: Insert the moved links after this link ID. Null means insert at the beginning.

    UpdateStashRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: New name for the stash

    DeleteLinksBatchRequest:
      type: object
      required: [linkIds]
      properties:
        linkIds:
          type: array
          items: { type: string, format: uuid }
          minItems: 1
          maxItems: 100

    PutBatchLinkScreenshotRequest:
      type: object
      required: [linkIds]
      properties:
        linkIds:
          type: array
          items: { type: string, format: uuid }
          minItems: 1
          maxItems: 100

    AccountProviderResponse:
      type: object
      properties:
        provider:
          type: string

    ClaimedStashSummaryResponse:
      type: object
      properties:
        stashId:
          type: string
          format: uuid
        stashName:
          type: string
        visibility:
          type: string
          enum:
            - SHARED
            - PRIVATE
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PagedClaimedStashResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ClaimedStashSummaryResponse'
        totalElements:
          type: integer
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    AccountResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
        providers:
          type: array
          items:
            $ref: '#/components/schemas/AccountProviderResponse'

    ClaimStashRequest:
      type: object
      required:
        - stashId
        - signature
      properties:
        stashId:
          type: string
          format: uuid
        signature:
          type: string
        password:
          type: string

    UpdateVisibilityRequest:
      type: object
      required:
        - visibility
      properties:
        visibility:
          type: string
          enum:
            - SHARED
            - PRIVATE

    UpdateLinkPermissionsRequest:
      type: object
      required:
        - permissions
      properties:
        permissions:
          type: string
          enum:
            - FULL
            - READ_ONLY

    EmbeddabilityCheckResponse:
      type: object
      properties:
        embeddable:
          type: boolean
        reason:
          type: string

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        errorCode:
          type: string
          description: Machine-readable error code (e.g. PASSWORD_REQUIRED, INVALID_TOKEN)
        path:
          type: string
        signatureRefreshedAt:
          type: string
          format: date-time
          description: When the stash signature was last regenerated (only set when errorCode is SIGNATURE_REGENERATED)

paths:
  /stashes:
    post:
      summary: Create a new stash
      operationId: createStash
      tags:
        - Stashes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStashRequest'
      responses:
        '201':
          description: Stash created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StashResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /stashes/{stashId}/access-token:
    parameters:
      - name: stashId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: X-Stash-Signature
        in: header
        required: false
        schema:
          type: string
        description: >
          HMAC-SHA256 signature proving URL access. Required for non-private stashes.
          Omit when using an account JWT to access a private stash as the claimer.
    post:
      summary: Acquire a short-lived access token for this stash
      description: >
        Unified token acquisition endpoint. Accepts three optional credentials:
        X-Stash-Signature (required for non-private stashes), Authorization: Bearer <accountJwt>
        (optional; used to detect claimer and grant access to private stashes), and password in the
        request body (required when the stash is password-protected).
        Returns 401 with errorCode PASSWORD_REQUIRED when the password is missing.
        Returns 401 with errorCode TOKEN_VERSION_MISMATCH when an existing token is stale.
      operationId: acquireAccessToken
      tags:
        - Stashes
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcquireAccessRequest'
      responses:
        '200':
          description: Access token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessTokenResponse'
        '401':
          description: Invalid signature, wrong password, or missing password (errorCode PASSWORD_REQUIRED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Stash is private and caller is not the claimer (errorCode STASH_PRIVATE)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Stash not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /stashes/{stashId}:
    parameters:
      - name: stashId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get stash by ID
      operationId: getStash
      tags:
        - Stashes
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Stash found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StashResponse'
        '401':
          description: Invalid or expired access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Stash not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      summary: Update stash name
      operationId: updateStash
      tags:
        - Stashes
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStashRequest'
      responses:
        '200':
          description: Stash updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StashResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or expired access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Stash not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Delete stash by ID
      operationId: deleteStash
      tags:
        - Stashes
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Stash deleted successfully
        '401':
          description: Invalid or expired access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Stash not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /stashes/{stashId}/password:
    parameters:
      - name: stashId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: X-Stash-Signature
        in: header
        required: true
        schema:
          type: string
        description: HMAC-SHA256 signature proving ownership of this stash
    put:
      summary: Set or change the stash password
      description: >
        Sets or changes the password on this stash.
        Requires the stash signature (proof of ownership).
        If the stash is currently password-protected, also requires a valid Bearer token
        with a matching pwdKey to prove knowledge of the current password.
      operationId: setStashPassword
      tags:
        - Stashes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetPasswordRequest'
      responses:
        '200':
          description: Password set successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StashResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid signature or invalid Bearer token for currently protected stash
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Stash not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Remove the stash password
      description: >
        Removes password protection from this stash.
        Requires the stash signature (proof of ownership) and a valid Bearer token
        with a matching pwdKey to prove knowledge of the current password.
      operationId: removeStashPassword
      tags:
        - Stashes
      responses:
        '204':
          description: Password removed successfully
        '401':
          description: Invalid signature or invalid Bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Stash not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /stashes/{stashId}/regenerate-signature:
    parameters:
      - name: stashId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: X-Stash-Signature
        in: header
        required: true
        schema:
          type: string
        description: HMAC-SHA256 signature proving ownership of this stash
    post:
      summary: Regenerate the stash signature (invalidates all old shared URLs)
      description: >
        Generates a new secret key for the stash, invalidating the previous signed URL.
        Only the claimer (or unclaimed stash owner) may call this.
        Returns the stash with the new signedUrl in the response.
      operationId: regenerateSignature
      tags:
        - Stashes
      responses:
        '200':
          description: Signature regenerated — new signedUrl in the response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StashResponse'
        '401':
          description: Invalid signature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only the owner can perform this action
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Stash not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /stashes/{stashId}/links:
    parameters:
      - name: stashId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Add a link to stash
      operationId: addLink
      tags:
        - Links
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddLinkRequest'
      responses:
        '201':
          description: Link added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or expired access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Stash not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Link with this URL already exists in stash
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      summary: Reorder links in stash
      operationId: reorderLinks
      tags:
        - Links
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderLinksRequest'
      responses:
        '204':
          description: Links reordered
        '401':
          description: Invalid or expired access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Stash not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: List links in stash
      operationId: listLinks
      tags:
        - Links
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          description: Search query for full-text search
          schema:
            type: string
        - name: page
          in: query
          description: Page number (0-based)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Page size
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of links
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedLinkResponse'
        '401':
          description: Invalid or expired access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /stashes/{stashId}/links/batch:
    parameters:
      - name: stashId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      summary: Add multiple links to stash in bulk
      operationId: addLinksBatch
      tags: [Links]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddLinksBatchRequest' }
      responses:
        '207':
          description: Bulk import completed (partial success possible)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AddLinksBatchResponse' }
        '400':
          description: Invalid request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Invalid or expired access token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Stash not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /stashes/{stashId}/links/{linkId}:
    parameters:
      - name: stashId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: linkId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      summary: Delete link by ID
      operationId: deleteLink
      tags:
        - Links
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Link deleted successfully
        '401':
          description: Invalid or expired access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Link does not belong to this stash
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Link not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /stashes/{stashId}/links/{linkId}/screenshot:
    parameters:
      - name: stashId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: linkId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      summary: Request screenshot refresh for link
      operationId: putLinkScreenshot
      tags:
        - Links
      security:
        - bearerAuth: []
      responses:
        '202':
          description: Screenshot refresh requested
        '401':
          description: Invalid or expired access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Link does not belong to this stash
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Link not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /stashes/{stashId}/links/batch-delete:
    parameters:
      - name: stashId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Delete multiple links in batch
      operationId: deleteLinksBatch
      tags:
        - Links
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteLinksBatchRequest'
      responses:
        '204':
          description: Links deleted successfully
        '401':
          description: Invalid or expired access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Link does not belong to this stash
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Stash not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /stashes/{stashId}/links/batch-screenshot:
    parameters:
      - name: stashId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      summary: Request screenshot refresh for multiple links in batch
      operationId: putBatchLinkScreenshot
      tags:
        - Links
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutBatchLinkScreenshotRequest'
      responses:
        '202':
          description: Screenshot refresh requested
        '401':
          description: Invalid or expired access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Link does not belong to this stash
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Stash not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /links/{linkId}/metadata:
    parameters:
      - name: linkId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: X-Indexer-Secret
        in: header
        required: true
        schema:
          type: string
        description: Shared secret for internal indexer callback authentication

    patch:
      summary: Update link metadata (internal indexer callback)
      operationId: updateLinkMetadata
      tags:
        - Links
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLinkMetadataRequest'
      responses:
        '200':
          description: Link metadata updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkResponse'
        '401':
          description: Invalid or missing indexer secret
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Link not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /links/{linkId}/status:
    parameters:
      - name: linkId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: X-Indexer-Secret
        in: header
