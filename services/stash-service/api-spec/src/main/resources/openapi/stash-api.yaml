          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /account/stashes:
    get:
      summary: List claimed stashes with search, sort, and pagination
      description: >
        Sort uses the JSON:API convention: prefix a field name with `-` for descending order.
        Supported fields: `name`, `createdAt`, `updatedAt`.
        Example: `sort=-createdAt` (newest first), `sort=name` (A→Z).
      operationId: listClaimedStashes
      tags:
        - Account
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
            default: ''
        - name: sort
          in: query
          description: >
            JSON:API sort field. Prefix with `-` for descending.
            Supported: `name`, `createdAt`, `updatedAt`. Default: `-createdAt`.
          schema:
            type: string
            default: '-createdAt'
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of claimed stashes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedClaimedStashResponse'
        '401':
          description: Invalid or missing account token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /account/stashes/claim:
    post:
      summary: Claim a stash for this account
      operationId: claimStash
      tags:
        - Account
      security:
