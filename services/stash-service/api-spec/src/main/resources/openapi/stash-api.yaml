  /account/ai-settings/models:
    get:
      summary: Fetch available model IDs for a given provider and API key (stateless, not persisted)
      operationId: getAiModels
      tags:
        - AccountAiSettings
      security:
        - bearerAuth: []
      parameters:
        - name: provider
          in: query
          required: true
          schema:
            type: string
            enum:
              - OPENROUTER_INCLUDED
              - OPENROUTER
              - OPENAI
              - ANTHROPIC
              - OPENCODE
        - name: X-Ai-Api-Key
          in: header
          required: false
          schema:
            type: string
          description: API key to use for fetching models (ignored for OPENROUTER_INCLUDED/OPENROUTER public list). Sent as a header to avoid leaking into server logs and browser history.
      responses:
        '200':
          description: List of available model IDs
          content:
            application/json:
              schema:
