spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: false
      routes:
        # Stash Service - stash routes
        - id: stash-service-stashes
          uri: ${STASH_SERVICE_URL:http://stash-service:8080}
          predicates:
            - Path=/api/stashes/**
          filters:
            - StripPrefix=1

        # Stash Service - link routes (including screenshot proxy)
        - id: stash-service-links
          uri: ${STASH_SERVICE_URL:http://stash-service:8080}
          predicates:
            - Path=/api/links/**
          filters:
            - StripPrefix=1

        # Health check route
        - id: health
          uri: ${STASH_SERVICE_URL:http://stash-service:8080}
          predicates:
            - Path=/health
          filters:
            - StripPrefix=0

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  health:
    defaults:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO
