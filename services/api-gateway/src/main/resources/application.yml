spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: false
      routes:
        # Stash Service Routes
        - id: stash-service
          uri: http://stash-service:8080
          predicates:
            - Path=/api/stashes/**
          filters:
            - StripPrefix=0
        
        # Indexer Service Routes
        - id: indexer-service
          uri: http://indexer-service:8080
          predicates:
            - Path=/api/indexer/**
          filters:
            - StripPrefix=1
        
        # Health check route
        - id: health
          uri: http://stash-service:8080
          predicates:
            - Path=/health
          filters:
            - StripPrefix=0

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  health:
    defaults:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO
