version: '3.8'

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: linkpouch
      POSTGRES_USER: linkpouch
      POSTGRES_PASSWORD: linkpouch_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkpouch"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  seaweedfs:
    image: chrislusf/seaweedfs:3.78
    command: >
      server
      -dir=/data
      -filer
      -s3
      -s3.config=/etc/seaweedfs/s3.json
      -s3.port=8333
    volumes:
      - seaweedfs_data:/data
      - ./config/seaweedfs-s3.json:/etc/seaweedfs/s3.json:ro
    ports:
      - "8333:8333"   # S3 API
      - "9333:9333"   # Master (for debugging)
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 10

  # ── Application Services ────────────────────────────────────────────────────

  stash-service:
    build:
      context: ./services/stash-service
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: linkpouch
      POSTGRES_USER: linkpouch
      POSTGRES_PASSWORD: linkpouch_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SIGNATURE_MASTER_KEY: local-dev-key
      S3_ENDPOINT: http://seaweedfs:8333
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: linkpouch-screenshots
      BASE_URL: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5

  indexer-service:
    build:
      context: ./services/indexer-service
      dockerfile: Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      STASH_SERVICE_URL: http://stash-service:8080
      S3_ENDPOINT: http://seaweedfs:8333
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: linkpouch-screenshots
    depends_on:
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      stash-service:
        condition: service_healthy

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      stash-service:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  redis_data:
  seaweedfs_data:
