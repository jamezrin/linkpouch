services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: linkpouch
      POSTGRES_USER: linkpouch
      POSTGRES_PASSWORD: linkpouch_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkpouch"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  seaweedfs:
    image: chrislusf/seaweedfs:4.17
    command: >
      server
      -dir=/data
      -filer
      -s3
      -s3.config=/etc/seaweedfs/s3.json
      -s3.port=8333
    volumes:
      - seaweedfs_data:/data
      - ./config/seaweedfs-s3.json:/etc/seaweedfs/s3.json:ro
    ports:
      - "8333:8333"   # S3 API
      - "9333:9333"   # Master (for debugging)
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      start_period: 40s
      retries: 10

  # ── Application Services ────────────────────────────────────────────────────

  atlas-migrate:
    build:
      context: ./services/stash-service
      dockerfile: Dockerfile
    entrypoint:
      - atlas
      - migrate
      - apply
      - --dir
      - file:///migrations
      - --url
      - "postgres://linkpouch:linkpouch_secret@postgres:5432/linkpouch?search_path=public&sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  stash-service:
    build:
      context: ./services/stash-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
      - "9090:9090"
    environment:
      SERVER_PORT: 8081
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: linkpouch
      POSTGRES_USER: linkpouch
      POSTGRES_PASSWORD: linkpouch_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SIGNATURE_MASTER_KEY: local-dev-key
      S3_ENDPOINT: http://seaweedfs:8333
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: linkpouch-screenshots
      BASE_URL: http://localhost:8080
      INDEXER_CALLBACK_SECRET: local-dev-indexer-secret
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: local-dev-placeholder
      GOOGLE_CLIENT_SECRET: local-dev-placeholder
      DISCORD_CLIENT_ID: local-dev-placeholder
      DISCORD_CLIENT_SECRET: local-dev-placeholder
      TWITTER_CLIENT_ID: local-dev-placeholder
      TWITTER_CLIENT_SECRET: local-dev-placeholder
      AI_INCLUDED_API_KEY: ${AI_INCLUDED_API_KEY}
      AI_ENCRYPTION_KEY: ${AI_ENCRYPTION_KEY:-QTUI8l2jsWm+syMVrsvhtoy5ckFluHLk3wyMTT/qBlk=}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      atlas-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5

  indexer-service:
    build:
      context: ./services/indexer-service
      dockerfile: Dockerfile
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      STASH_SERVICE_GRPC_HOST: stash-service
      STASH_SERVICE_GRPC_PORT: 9090
      S3_ENDPOINT: http://seaweedfs:8333
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: linkpouch-screenshots
      INDEXER_CALLBACK_SECRET: local-dev-indexer-secret
    depends_on:
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      stash-service:
        condition: service_healthy

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    environment:
      STASH_SERVICE_URL: http://stash-service:8081
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    depends_on:
      stash-service:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  redis_data:
  seaweedfs_data:
